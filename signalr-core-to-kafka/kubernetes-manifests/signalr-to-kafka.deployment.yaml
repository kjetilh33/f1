apiVersion: apps/v1
kind: Deployment
metadata:
  name: signalr-core-to-kafka
  labels:
    app: signalr-core-to-kafka
    app.kubernetes.io/name: signalr-core-to-kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: signalr-core-to-kafka
  template:
    metadata:
      labels:
        app.kubernetes.io/name: signalr-core-to-kafka
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9400"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: signalr-core-to-kafka
          image: signalr-core-to-kafka
          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 9400
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=75.0"
          volumeMounts:
            - mountPath: "/config"                  # The file path used by SmallRye to search for config files.
              name: config                          # Name of the "volume" to mount. Specified below in the volumes section.
              readOnly: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      # Map the config map generated by Kustomize as a file volume
      volumes:
        - name: config                              # Give the volume a name you can reference in the container spec.
          configMap:                                # Specifies that you source the data from a ConfigMap.
            name: signalr-core-to-kafka-config                    # The name of the ConfigMap to read from
      restartPolicy: Always
#     serviceAccountName: extractor-default
