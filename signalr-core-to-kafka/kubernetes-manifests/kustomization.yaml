apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

#namespace: default
commonLabels:
  app.kubernetes.io/name: signalr-core-to-kafka
  app: signalr-core-to-kafka
resources:
  - signalr-core-to-kafka.deployment.yaml
  - signalr-core-to-kafka.service.yaml

# The generator will convert the config.yaml file into a K8 config map which can be mapped
# into the container
configMapGenerator:
  - name: signalr-core-to-kafka-config
    files:
      - config.yaml=config.yaml

generatorOptions:
  disableNameSuffixHash: true