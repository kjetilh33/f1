apiVersion: v1
kind: Service
metadata:
  name: signalr-core-to-kafka
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: signalr-core-to-kafka
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30000
    - name: metrics
      protocol: TCP
      port: 9400
      targetPort: 9400
